    tier: 2
    description: AI が一度に「覚えていられる」情報量
    angle: Claude と ChatGPT、覚えていられる量がこんなに違う

  - id: 12
    term: システムプロンプト
    en: System Prompt
    tier: 2
    description: AI に与える役割と性格の指示
